appId: com.koe.desktop
productName: koe
directories:
  buildResources: build
  output: release
files:
  - out/**/*
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [universal]
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "koe needs microphone access to record audio for transcription."
    NSScreenCaptureUsageDescription: "koe needs screen recording access to capture system audio from web meetings."
