appId: com.koe.desktop
productName: koe
directories:
  buildResources: build
  output: release
files:
  - out/**/*
extraResources:
  - from: "../worker/dist/koe-sidecar-darwin-${arch}"
    to: "sidecar/koe-sidecar"
  - from: "build/ffmpeg"
    to: "ffmpeg"
    filter:
      - "**/*"
  - from: "build/trayIconTemplate.png"
    to: "trayIconTemplate.png"
  - from: "build/trayIconTemplate@2x.png"
    to: "trayIconTemplate@2x.png"
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "koe needs microphone access to record audio for transcription."
    NSScreenCaptureUsageDescription: "koe needs screen recording access to capture system audio from web meetings."
